# =============================================================================
# IT HelpDesk Agent - Nginx Reverse Proxy Configuration
# Domain: helpdesk.ai3lines.com
#
# Installation:
#   1. Copy this file to /etc/nginx/sites-available/helpdesk.conf
#   2. ln -s /etc/nginx/sites-available/helpdesk.conf /etc/nginx/sites-enabled/
#   3. Install SSL cert: certbot --nginx -d helpdesk.ai3lines.com
#   4. nginx -t && systemctl reload nginx
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name helpdesk.ai3lines.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name helpdesk.ai3lines.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/helpdesk.ai3lines.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/helpdesk.ai3lines.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API requests to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for LLM responses (can be slow)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Proxy everything else to Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Request size limit (for file uploads if needed)
    client_max_body_size 10M;
}
